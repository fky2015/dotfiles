set -g default-terminal "screen-256color"

# mouse scroll
set-window-option -g mouse on

#up
bind-key k select-pane -U
#down
bind-key j select-pane -D
#left
bind-key h select-pane -L
#right
bind-key l select-pane -R

# Open new windows in current directory.
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @tpm_plugins '          \
  tmux-plugins/tpm             \
  thewtex/tmux-mem-cpu-load    \
  tmux-plugins/tmux-sensible   \
'

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind-key C-a last-window
# support OSC52
# See test:
# `printf "\e]52;c;%s\a" "$(echo -n 'THE TEXT TO COPY' | openssl base64 -A)"`
set -s set-clipboard on
set -as terminal-overrides ',screen-256color:Ms=\E]52;%p1%s;%p2%s\007'

set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#(~/.config/tmux/get_window_name.sh "#{pane_current_path}" "#{pane_current_command}")'

set -g pane-border-style fg='#6272a4'
set -g pane-active-border-style fg='#ff79c6'
set -g status-style bg='#4c566a',fg='#d8dee9'
set -g status-interval 1

set -g status-left ' #{?client_prefix,Ω,ω} | #[default]'
set -g status-right '#[fg=#6272a4,bg=#4c566a]#($TMUX_PLUGIN_MANAGER_PATH/tmux-mem-cpu-load/tmux-mem-cpu-load --colors --powerline-right --interval 1)#[default]'
set -g status-left-length 60


# '@pane-is-vim' is a pane-local option that is set by the plugin on load,
# and unset when Neovim exits or suspends; note that this means you'll probably
# not want to lazy-load smart-splits.nvim, as the variable won't be set until
# the plugin is loaded

# Smart pane switching with awareness of Neovim splits.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Reset window style when focused (clears Claude Code notification highlight)
set-hook -g pane-focus-in 'set-option -w window-status-style default'

# Jump to next notified (red,bold) window
bind C-j run-shell '~/.config/tmux/jump-to-notified.sh'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Bring back clear screen under tmux prefix
bind C-l send-keys 'C-l'
